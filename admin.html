<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin | P2P BD</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"
    />
    <style>
      :root {
        --bg: #05080f;
        --card: rgba(17, 25, 40, 0.75);
        --accent: #3b82f6;
      }
      body {
        background-color: var(--bg);
        color: #f8fafc;
        font-family: "Plus Jakarta Sans", sans-serif;
        padding-bottom: 100px;
      }
      .glass {
        background: var(--card);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
      }
      .bottom-nav {
        position: fixed;
        bottom: 15px;
        left: 10px;
        right: 10px;
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        display: flex;
        justify-content: space-around;
        padding: 12px 5px;
        z-index: 1000;
      }
      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        color: #64748b;
        font-size: 9px;
        font-weight: 700;
        flex: 1;
      }
      .nav-item.active {
        color: var(--accent);
      }
      .nav-icon {
        font-size: 18px;
      }
      .stat-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        padding: 15px;
        border-radius: 18px;
      }
      .badge-buy {
        color: #3b82f6;
        background: rgba(59, 130, 246, 0.1);
        padding: 2px 8px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 700;
      }
      .badge-sell {
        color: #10b981;
        background: rgba(16, 185, 129, 0.1);
        padding: 2px 8px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 700;
      }
      .status-select {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 8px;
        border-radius: 10px;
        color: white;
        font-size: 12px;
        width: 100%;
      }
      .input-modern {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 14px;
        border-radius: 16px;
        color: white;
        width: 100%;
        margin-bottom: 10px;
      }
      .hidden {
        display: none;
      }
      .slide-up {
        animation: slideUp 0.3s ease-out;
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="p-4 max-w-4xl mx-auto">
      <div class="flex justify-between items-center mb-6 pt-2">
        <h1 class="text-2xl font-extrabold tracking-tight">
          Admin<span class="text-blue-500">Flow</span>
        </h1>
        <p
          id="page-title"
          class="text-blue-400 text-[10px] font-bold uppercase tracking-widest bg-blue-500/10 px-3 py-1 rounded-full"
        >
          Dashboard
        </p>
      </div>

      <div id="home-tab" class="tab-content slide-up">
        <div class="grid grid-cols-2 gap-3 mb-4">
          <div class="stat-card">
            <p class="text-slate-500 text-[10px] uppercase font-bold">
              Total Users
            </p>
            <h3 id="stat-users" class="text-2xl font-bold">0</h3>
          </div>
          <div class="stat-card">
            <p class="text-slate-500 text-[10px] uppercase font-bold">
              Total Orders
            </p>
            <h3 id="stat-total-orders" class="text-2xl font-bold">0</h3>
          </div>
        </div>
        <div class="grid grid-cols-3 gap-2">
          <div class="stat-card border-emerald-500/20">
            <p class="text-emerald-500 text-[9px] uppercase font-bold">
              Completed
            </p>
            <h3 id="stat-completed" class="text-xl font-bold">0</h3>
          </div>
          <div class="stat-card border-yellow-500/20">
            <p class="text-yellow-500 text-[9px] uppercase font-bold">
              Pending
            </p>
            <h3 id="stat-pending" class="text-xl font-bold">0</h3>
          </div>
          <div class="stat-card border-red-500/20">
            <p class="text-red-500 text-[9px] uppercase font-bold">Cancelled</p>
            <h3 id="stat-cancelled" class="text-xl font-bold">0</h3>
          </div>
        </div>
      </div>

      <div id="new-tab" class="tab-content hidden slide-up space-y-4">
        <div id="new-orders-list"></div>
      </div>
      <div id="orders-tab" class="tab-content hidden slide-up space-y-4">
        <div id="all-orders-list"></div>
      </div>

      <div id="rates-tab" class="tab-content hidden slide-up">
        <div class="glass p-6">
          <h3 class="text-lg font-bold mb-4">System Settings</h3>
          <div class="grid grid-cols-2 gap-2">
            <input
              id="buy-rate-input"
              type="number"
              class="input-modern"
              placeholder="Buy Rate"
            />
            <input
              id="sell-rate-input"
              type="number"
              class="input-modern"
              placeholder="Sell Rate"
            />
          </div>
          <input
            id="pay-num"
            type="text"
            class="input-modern"
            placeholder="Payment Number"
          />
          <input
            id="admin-wallet"
            type="text"
            class="input-modern"
            placeholder="Admin Wallet (BEP20)"
          />
          <textarea
            id="admin-notice-text"
            class="input-modern h-20"
            placeholder="Live Notice Text"
          ></textarea>
          <input
            id="admin-tg-user"
            type="text"
            class="input-modern"
            placeholder="Telegram Support User/Link"
          />

          <h3
            class="text-sm font-bold mt-4 mb-2 text-blue-400 uppercase tracking-widest"
          >
            Telegram Bot Config (Dynamic)
          </h3>
          <input
            id="dyn-bot-token"
            type="text"
            class="input-modern"
            placeholder="Bot Token"
          />
          <input
            id="dyn-chat-id"
            type="text"
            class="input-modern"
            placeholder="Your Chat ID"
          />

          <button
            onclick="saveAllSettings()"
            class="w-full bg-blue-600 p-4 rounded-xl font-bold mt-2"
          >
            Save All Settings
          </button>
        </div>
      </div>

      <div id="users-tab" class="tab-content hidden slide-up space-y-3">
        <div id="users-list"></div>
      </div>
    </div>

    <div class="bottom-nav">
      <button
        onclick="switchTab('home-tab', 'Dashboard')"
        id="nav-home"
        class="nav-item active"
      >
        <span class="nav-icon">🏠</span><span>Home</span>
      </button>
      <button
        onclick="switchTab('new-tab', 'New Orders')"
        id="nav-new"
        class="nav-item"
      >
        <span class="nav-icon">🔔</span><span>New</span>
      </button>
      <button
        onclick="switchTab('orders-tab', 'All Orders')"
        id="nav-orders"
        class="nav-item"
      >
        <span class="nav-icon">📋</span><span>Orders</span>
      </button>
      <button
        onclick="switchTab('rates-tab', 'Settings')"
        id="nav-rates"
        class="nav-item"
      >
        <span class="nav-icon">⚙️</span><span>Rates</span>
      </button>
      <button
        onclick="switchTab('users-tab', 'Users')"
        id="nav-users"
        class="nav-item"
      >
        <span class="nav-icon">👥</span><span>Users</span>
      </button>
    </div>
